<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연간 플래너</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  .container {
    padding: 20px;
    display: grid;
    grid-template-columns: 80px repeat(4, 1fr);
    gap: 12px;
  }

  .header {
    font-weight: bold;
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #333;
  }

  .month {
    text-align: center;
    font-weight: bold;
    padding-top: 20px;
  }

  .card {
    background: #1a1d24;
    border-radius: 10px;
    padding: 12px;
    min-height: 120px;
    white-space: pre-wrap;
    outline: none;
  }

  .core { background: #2a1f1a; }
  .social { background: #201a2a; }
  .growth { background: #1a2a24; }
  .admin { background: #222; }

  .card:focus {
    border: 1px solid #4dabf7;
  }
</style>
</head>

<body>

<h1>📅 Pong Year Planner </h1>

<div class="container">

  <div></div>
  <div class="header">🔥 Core</div>
  <div class="header">👥 Social</div>
  <div class="header">🌱 Growth</div>
  <div class="header">⚙️ Admin</div>

  <script>
    const months = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
    const categories = ["core","social","growth","admin"];

    // HTML 생성
    months.forEach(month => {
      document.write(`<div class="month">${month}</div>`);
      categories.forEach(cat => {
        document.write(`<div contenteditable class="card ${cat}"></div>`);
      });
    });
  </script>

</div>

<script>
  // LocalStorage에서 데이터 불러오기
  function loadData() {
    months.forEach((month, mIdx) => {
      categories.forEach((cat) => {
        const key = `${month}_${cat}`;
        const card = document.querySelectorAll(`.card.${cat}`)[mIdx];
        if(localStorage.getItem(key)) {
          card.innerText = localStorage.getItem(key);
        }
      });
    });
  }

  // 데이터 저장
  function saveData(month, category, value) {
    const key = `${month}_${category}`;
    localStorage.setItem(key, value);
  }

  // 페이지 로드 시 이벤트 연결
  window.onload = () => {
    loadData();

    months.forEach((month, mIdx) => {
      categories.forEach((cat) => {
        const card = document.querySelectorAll(`.card.${cat}`)[mIdx];
        card.addEventListener("input", () => {
          saveData(month, cat, card.innerText);
        });
      });
    });
  };
</script>

</body>
</html>
