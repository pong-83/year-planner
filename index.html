<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pong Year Planner</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'AppleSDGothicNeo', -apple-system, sans-serif;
}

.header { padding: 20px; font-size: 20px; font-weight: 800; }
.container { padding: 20px; }

.grid {
  display: grid;
  grid-template-columns: 80px repeat(4, 1fr);
  row-gap: 28px;
  column-gap: 16px;
}

.category {
  border: 1px solid #A3AAAE;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  padding: 8px;
  font-size: 12px;
}

.icon { font-size: 10px; opacity:0.9; }

.month {
  font-size: 12px;
  color: #6E6E70;
  font-weight: 800;
  display: flex;
  align-items: flex-end;
}

.card {
  border-top: 0.5px solid #6E6E70;
  padding-top: 6px;
  cursor: pointer;
  transition: border-color 0.2s ease;
}

.card:hover:not(.active) {
  border-top-color: #FFFFFF;
}

.card.active.core { border-top-color: #ff6b6b; }
.card.active.growth { border-top-color: #4cd964; }
.card.active.social { border-top-color: #5ac8fa; }
.card.active.admin { border-top-color: #a0a0a0; }

.title {
  font-size: 10px;
  transition: color 0.2s ease, font-weight 0.2s ease;
}

.detail {
  max-height: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}

.card.active .detail {
  max-height: 300px;
  margin-top: 10px;
}

textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 10px;
  resize: none;
}
</style>
</head>

<body>

<div class="header">. year planner</div>
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 Firebase 설정 */
const firebaseConfig = {
  apiKey: "AIzaSyBf-pfa3u9ckXJe_hYxI8wfpC8p3VGKs5k",
  authDomain: "year-planner-2521a.firebaseapp.com",
  projectId: "year-planner-2521a",
  storageBucket: "year-planner-2521a.firebasestorage.app",
  messagingSenderId: "972744143802",
  appId: "1:972744143802:web:24f6083e95c77c3697a383"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USER_ID = "test_user"; // 로그인 전 테스트용

/* 데이터 로드/저장 */
async function loadData() {
  const ref = doc(db, "users", USER_ID);
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data().data : {};
}

async function saveData(data) {
  await setDoc(doc(db, "users", USER_ID), { data });
}

/* UI 설정 */
const months = ["Jan.","Feb.","Mar.","Apr.","May.","Jun.","Jul.","Aug.","Sep.","Oct.","Nov.","Dec."];
const categories = ["Core","Social","Growth","Admin"];
const icons = { Core:"🔥", Social:"👥", Growth:"🌱", Admin:"⚙️" };
const EMPTY_TEXT = "Add plan";

const grid = document.getElementById("grid");

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* 실행 */
loadData().then(data => {

  // 빈칸 + 카테고리 헤더
  grid.appendChild(document.createElement("div"));
  categories.forEach(cat => {
    const el = document.createElement("div");
    el.className = "category";
    el.innerHTML = `<span class="icon">${icons[cat]}</span> ${cat}`;
    grid.appendChild(el);
  });

  // 각 달 생성
  months.forEach((month, rowIndex) => {
    const m = document.createElement("div");
    m.className = "month";
    m.innerText = month;
    grid.appendChild(m);

    categories.forEach((cat, colIndex) => {
      const key = `${rowIndex}-${colIndex}`;
      const card = document.createElement("div");
      card.className = "card " + cat.toLowerCase();

      const title = document.createElement("div");
      title.className = "title";

      // 초기 제목 스타일
      const initFirst = data[key]?.title || "";
      if(initFirst) {
        title.innerText = initFirst;
        title.style.color = "#FFFFFF";
        title.style.fontWeight = "700";
      } else {
        title.innerText = EMPTY_TEXT;
        title.style.color = "#6E6E70";
        title.style.fontWeight = "300";
      }

      const detail = document.createElement("div");
      detail.className = "detail";

      const textarea = document.createElement("textarea");
      textarea.value = data[key]?.detail || "";
      setTimeout(() => autoResize(textarea), 0);

      // input 이벤트
      textarea.addEventListener("input", () => {
        autoResize(textarea);
        const firstLine = textarea.value.split("\n")[0] || "";
        data[key] = { title:firstLine, detail:textarea.value };
        saveData(data);

        // 제목 스타일 업데이트
        if(firstLine && firstLine.trim() !== "") {
          title.innerText = firstLine;
          title.style.color = "#FFFFFF";
          title.style.fontWeight = "700";
        } else {
          title.innerText = EMPTY_TEXT;
          title.style.color = "#6E6E70";
          title.style.fontWeight = "300";
        }
      });

      textarea.addEventListener("click", e => e.stopPropagation());

      detail.appendChild(textarea);
      card.appendChild(title);
      card.appendChild(detail);

      // 클릭 시 활성화
      card.addEventListener("click", () => {
        const isActive = card.classList.contains("active");
        document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
        if(!isActive){
          card.classList.add("active");
          setTimeout(()=>autoResize(textarea),100);
        }
      });

      grid.appendChild(card);
    });
  });

});
</script>

</body>
</html>
