<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pong Year Planner</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'AppleSDGothicNeo', -apple-system, sans-serif;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 20px;
  font-weight: 800;
}

/* GRID */
.container {
  padding: 20px;
}
.grid {
  display: grid;
  grid-template-columns: 80px repeat(4, 1fr);
  row-gap: 28px;
  column-gap: 16px;
}

/* CATEGORY */
.category {
  border: 1px solid #A3AAAE;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 4px;
  padding: 8px;
  font-size: 12px;
}
.icon { font-size: 10px; transform: translateY(-0.5px); opacity:0.9; }
.label { display: flex; align-items: center; }

/* MONTH */
.month {
  font-size: 12px;
  color: #6E6E70;
  font-weight: 800;
  display: flex;
  align-items: flex-end;
}

/* CARD */
.card {
  border-top: 0.5px solid #6E6E70;
  padding-top: 6px;
  cursor: pointer;
  transition: all 0.25s ease;
}
.card.active { border-top: 0.5px solid #FFFFFF; }
.card.core.active { border-top-color: #ff6b6b; }
.card.growth.active { border-top-color: #4cd964; }
.card.social.active { border-top-color: #5ac8fa; }
.card.admin.active { border-top-color: #a0a0a0; }

/* TITLE */
.title {
  font-size: 10px;
  font-weight: 700;
  display: flex;
  gap: 4px;
  transition: color 0.2s ease;
}

/* DETAIL */
.detail {
  max-height: 0;
  overflow: hidden;
  transition: all 0.3s ease;
}
.card.active .detail {
  max-height: 300px;
  margin-top: 10px;
}

/* TEXTAREA */
textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 10px;
  font-weight: 300;
  resize: none;
  line-height: 1.5;
  letter-spacing: -0.1px;
}
</style>
</head>
<body>

<div class="header">. year planner</div>
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const months = ["Jan.","Feb.","Mar.","Apr.","May.","Jun.","Jul.","Aug.","Sep.","Oct.","Nov.","Dec."];
const categories = ["Core","Social","Growth","Admin"];
const icons = { Core:"🔥", Social:"👥", Growth:"🌱", Admin:"⚙️" };
const STORAGE_KEY = "pong_planner_data";
const EMPTY_TEXT = "Add plan";

const grid = document.getElementById("grid");

/* STORAGE */
const loadData = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
const saveData = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
let data = loadData();

/* textarea 자동 높이 */
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* CATEGORY HEADER */
grid.appendChild(document.createElement("div")); // 빈칸
categories.forEach(cat => {
  const el = document.createElement("div");
  el.className = "category";
  el.innerHTML = `<span class="icon">${icons[cat]}</span><span class="label">${cat}</span>`;
  grid.appendChild(el);
});

/* GRID 생성 */
months.forEach((month, rowIndex) => {
  const m = document.createElement("div");
  m.className = "month";
  m.innerText = month;
  grid.appendChild(m);

  categories.forEach((cat, colIndex) => {
    const key = `${rowIndex}-${colIndex}`;
    const card = document.createElement("div");
    card.className = "card " + cat.toLowerCase();

    const title = document.createElement("div");
    title.className = "title";

    // ✅ 안정화된 title 표시
    if(data[key]?.title && data[key].title.trim() !== ""){
        title.innerText = data[key].title;
        title.style.color = "#FFFFFF";
    } else {
        title.innerText = EMPTY_TEXT;
        title.style.color = "#6E6E70";
    }

    const detail = document.createElement("div");
    detail.className = "detail";

    const textarea = document.createElement("textarea");
    textarea.value = data[key]?.detail || "";
    setTimeout(() => autoResize(textarea), 0);

    textarea.addEventListener("input", () => {
      autoResize(textarea);
      const firstLine = textarea.value.split("\n")[0] || "";
      data[key] = { title:firstLine, detail:textarea.value };
      saveData(data);
      // ✅ input 시 title 업데이트
      if(firstLine && firstLine.trim() !== ""){
        title.innerText = firstLine;
        title.style.color = "#FFFFFF";
      } else {
        title.innerText = EMPTY_TEXT;
        title.style.color = "#6E6E70";
      }
    });
    textarea.addEventListener("click", e => e.stopPropagation());

    detail.appendChild(textarea);
    card.appendChild(title);
    card.appendChild(detail);

    card.addEventListener("click", () => {
      const isActive = card.classList.contains("active");
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      if(!isActive){ 
        card.classList.add("active"); 
        setTimeout(()=>autoResize(textarea),200);
      }
    });

    grid.appendChild(card);
  });
});
</script>
</body>
</html>
